name: Release

# Publishes the public packages to npm when a version tag is pushed (e.g. v1.3.0).
#
# Auth = npm TRUSTED PUBLISHING (OIDC) — there is NO long-lived NPM_TOKEN secret.
# The job mints a short-lived credential from GitHub's OIDC token (id-token: write),
# so nothing publishable can leak from the repo. One-time setup (on npmjs.com, by a
# scope owner): for EACH package, add a Trusted Publisher →
#   GitHub Actions · repository: ExcaliburOSS/excalibur-core · workflow: release.yml
# (npm only allows configuring a trusted publisher for a package that already exists,
# which both do.)
#
# Packing is done with pnpm (it rewrites `workspace:*` dev deps out of the published
# manifest → clean `deps: {}`); publishing the resulting tarball is done with npm
# (>= 11.5.1) so the OIDC exchange + provenance attestation run. The full CI gate
# runs first — never publish an unbuilt or failing tree.
on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish:
    name: build · verify · publish to npm (trusted publishing)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing + the provenance attestation
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs a recent npm; node's bundled npm may predate it.
      - name: Ensure npm supports Trusted Publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Same gate as CI — never publish an unbuilt or failing tree.
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Test
        run: pnpm -r test

      # Pack with pnpm (rewrites `workspace:*` → real versions, so no protocol leaks
      # into the tarball), then publish that tarball with npm via OIDC + provenance.
      - name: Pack @excalibur-oss/extension-sdk
        run: pnpm pack --pack-destination "$RUNNER_TEMP"
        working-directory: packages/extension-sdk
      - name: Pack @excalibur-oss/excalibur
        run: pnpm pack --pack-destination "$RUNNER_TEMP"
        working-directory: apps/cli

      - name: Publish @excalibur-oss/extension-sdk
        run: npm publish "$RUNNER_TEMP"/excalibur-oss-extension-sdk-*.tgz --access public --provenance
      - name: Publish @excalibur-oss/excalibur
        run: npm publish "$RUNNER_TEMP"/excalibur-oss-excalibur-*.tgz --access public --provenance
